<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1Calendar - 农历与法定假日日历</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #FAF8F5;
            --bg-card: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #6B6B6B;
            --accent-red: #C41E3A;
            --accent-green: #2D5A27;
            --accent-gold: #D4A853;
            --border: #E8E4DF;
            --shadow-soft: 0 20px 60px rgba(0,0,0,0.08);
            --shadow-hover: 0 30px 80px rgba(0,0,0,0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Subtle texture overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            z-index: 1000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 0;
            background: rgba(250, 248, 245, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        nav.scrolled {
            border-bottom-color: var(--border);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 28px;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent-red);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Noto Serif SC', serif;
            font-size: 20px;
        }

        .nav-btn {
            background: var(--text-primary);
            color: white;
            padding: 12px 28px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(26, 26, 26, 0.3);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 120px 0 200px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(196, 30, 58, 0.05) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(45, 90, 39, 0.04) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .hero-text {
            position: relative;
            z-index: 2;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            border: 1px solid var(--border);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.1s;
        }

        .hero-badge-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .hero-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 64px;
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 24px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.2s;
        }

        .hero-title span {
            color: var(--accent-red);
        }

        .hero-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-style: italic;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.3s;
        }

        .hero-features {
            display: flex;
            gap: 24px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.4s;
        }

        .hero-feature {
            font-size: 15px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hero-feature svg {
            color: var(--text-primary);
        }

        .btn-primary {
            background: var(--accent-red);
            color: white;
            padding: 16px 36px;
            border-radius: 28px;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(196, 30, 58, 0.35);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            padding: 16px 32px;
            border-radius: 28px;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--text-primary);
        }

        .hero-visual {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.5s;
        }

        .calendar-mockup {
            width: 380px;
            height: 420px;
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: var(--shadow-soft);
            padding: 32px;
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .calendar-month {
            font-family: 'Noto Serif SC', serif;
            font-size: 24px;
            font-weight: 600;
        }

        .calendar-year {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-day-header {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            padding: 8px 0;
            font-weight: 500;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 14px;
            position: relative;
            transition: all 0.2s ease;
        }

        .calendar-day:hover {
            background: var(--bg-primary);
        }

        .calendar-day.today {
            background: var(--accent-red);
            color: white;
        }

        .calendar-day.lunar {
            font-size: 10px;
            color: var(--accent-green);
        }

        .calendar-day.today .lunar-text {
            color: rgba(255,255,255,0.8);
        }

        .lunar-text {
            font-size: 9px;
            color: var(--accent-green);
            margin-top: 2px;
        }

        .holiday-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 6px;
            height: 6px;
            background: var(--accent-red);
            border-radius: 50%;
        }

        .calendar-events {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 13px;
        }

        .event-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .event-dot.red { background: var(--accent-red); }
        .event-dot.green { background: var(--accent-green); }
        .event-dot.gold { background: var(--accent-gold); }

        /* Floating elements */
        .float-element {
            position: absolute;
            animation: float 4s ease-in-out infinite;
        }

        .float-element-1 {
            top: -20px;
            right: -30px;
            width: 60px;
            height: 60px;
            background: var(--accent-gold);
            border-radius: 16px;
            opacity: 0.2;
            animation-delay: 0s;
        }

        .float-element-2 {
            bottom: 40px;
            left: -40px;
            width: 80px;
            height: 80px;
            background: var(--accent-red);
            border-radius: 50%;
            opacity: 0.1;
            animation-delay: 1s;
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 12px;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
            animation-delay: 1s;
        }

        .scroll-indicator-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--text-secondary), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        /* Download Section */
        .download {
            padding: 80px 0;
            text-align: center;
            position: relative;
            margin-top: -120px;
            border-radius: 40px 40px 0 0;
            background: var(--bg-primary);
        }

        .download::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(196, 30, 58, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .download-content {
            position: relative;
            z-index: 2;
        }

        .download-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .download-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 48px;
        }

        .download-btn {
            background: var(--accent-red);
            color: white;
            padding: 20px 60px;
            border-radius: 32px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 60px rgba(196, 30, 58, 0.4);
        }

        .download-btn svg {
            width: 24px;
            height: 24px;
        }

        .download-note {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Footer */
        footer {
            padding: 60px 0;
            border-top: 1px solid var(--border);
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-copy {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .footer-links {
            display: flex;
            gap: 32px;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: var(--accent-red);
        }

        /* Animations */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        @keyframes scrollPulse {
            0%, 100% {
                opacity: 0.3;
                transform: scaleY(1);
            }
            50% {
                opacity: 1;
                transform: scaleY(1.2);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .hero-content {
                grid-template-columns: 1fr;
                gap: 60px;
            }

            .hero-title {
                font-size: 48px;
            }

            .hero-visual {
                order: -1;
            }

            .calendar-mockup {
                width: 320px;
                height: 360px;
            }

        }

        @media (max-width: 768px) {
            .hero {
                padding: 100px 0 160px;
            }

            .hero-title {
                font-size: 36px;
            }

            .hero-subtitle {
                font-size: 18px;
            }

            .hero-features {
                flex-direction: column;
                gap: 12px;
            }

            .download {
                padding: 100px 0;
            }

            .download-title {
                font-size: 32px;
            }

            .footer-content {
                flex-direction: column;
                gap: 24px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav id="navbar">
        <div class="container nav-content">
            <a href="#" class="logo">
                <span class="logo-icon">历</span>
                1Calendar
            </a>
            <a href="https://github.com/x1claw/1Calendar/releases" class="nav-btn">下载</a>

                    <div class="hero-feature">🎉 自动标注法定节假日</div>
                    <div class="hero-feature"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg> macOS Menu Bar 快捷访问</div>
                </div>
            </div>

    <!-- Download Section -->

        <div class="container">

                <a href="#">隐私政策</a>
                <a href="#">联系我们</a>
            </div>
        </div>
    </footer>

    <script>
        // Generate calendar
        (function generateCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();

            const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
            const dayNames = ['日', '一', '二', '三', '四', '五', '六'];

            document.getElementById('calendarMonth').textContent = monthNames[month];
            document.getElementById('calendarYear').textContent = year;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = now.getDate();

            let html = '';
            dayNames.forEach(day => {
                html += `<div class="calendar-day-header">${day}</div>`;
            });

            for (let i = 0; i < firstDay; i++) {
                html += '<div class="calendar-day"></div>';
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const isToday = day === today;
                html += `<div class="calendar-day${isToday ? ' today' : ''}">${day}</div>`;
            }

            document.getElementById('calendarGrid').innerHTML = html;
        })();

        // Navbar scroll effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Scroll animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    setTimeout(() => {
                        entry.target.classList.add('visible');
                    }, index * 100);
                }
            });
        }, observerOptions);

        // Observe feature cards
        document.querySelectorAll('.feature-card').forEach(card => {
            observer.observe(card);
        });

        // Smooth scroll for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>
